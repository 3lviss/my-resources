version: "3.9"

services:

  # -----------------
  # PostgreSQL Database
  # -----------------
  db:
    image: postgres:15
    container_name: db
    env_file:
      - ./backend/.env.prod
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  # -----------------
  # Backend (FastAPI)
  # -----------------
  backend:
    build: ./backend
    container_name: backend
    env_file:
      - ./backend/.env.prod
    depends_on:
      - db
    restart: always

  # -----------------
  # Frontend (React + Vite)
  # -----------------
  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

# -----------------
# Volumes for persistent storage
# -----------------
volumes:
  pgdata:
